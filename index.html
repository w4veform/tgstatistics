const C = { bg:"#0f172a", card:"#1e293b", border:"#334155", text:"#e2e8f0", muted:"#94a3b8", green:"#6ee7b7", red:"#f87171", yellow:"#fbbf24", purple:"#a78bfa" };
const short = n => n.length > 20 ? n.slice(0,18)+"…" : n;

function StatCard({ label, value, color }) {
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"16px 18px", flex:1, minWidth:110 }}>
      <div style={{ fontSize:22, fontWeight:800, color, lineHeight:1 }}>{value}</div>
      <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>{label}</div>
    </div>
  );
}

function CustomTooltipSub({ active, payload, label, data }) {
  if (!active || !payload?.length) return null;
  const row = data.find(d => short(d.n) === label);
  return (
    <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:8, padding:"10px 14px", fontSize:13 }}>
      <div style={{ fontWeight:700, color:C.green, marginBottom:4 }}>{row?.n || label}</div>
      <div>Изменение: <b style={{ color: payload[0].value >= 0 ? C.green : C.red }}>{payload[0].value >= 0 ? "+" : ""}{payload[0].value}%</b></div>
      <div>Абсолютно: <b>{row?.ds >= 0 ? "+" : ""}{row?.ds}</b></div>
    </div>
  );
}

function CustomTooltipER({ active, payload, label, data }) {
  if (!active || !payload?.length) return null;
  const row = data.find(d => short(d.n) === label);
  return (
    <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:8, padding:"10px 14px", fontSize:13 }}>
      <div style={{ fontWeight:700, color:C.green, marginBottom:4 }}>{row?.n || label}</div>
      {payload.map((p,i) => <div key={i} style={{ color:p.fill === "#64748b" ? C.muted : (row?.de >= 0 ? C.green : C.red) }}>{p.name}: <b>{p.value}%</b></div>)}
      <div style={{ marginTop:4, color: row?.de >= 0 ? C.green : C.red }}>Δ: <b>{row?.de >= 0 ? "+" : ""}{row?.de}%</b></div>
    </div>
  );
}

function ScatterTip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  return (
    <div style={{ background:"#1e293b", border:"1px solid #334155", borderRadius:8, padding:"10px 14px", fontSize:13 }}>
      <div style={{ fontWeight:700, color:C.green, marginBottom:4 }}>{d.n}</div>
      <div>Подписчики (май): <b>{d.sM.toLocaleString()}</b></div>
      <div>ER (май): <b>{d.eM}%</b></div>
      <div style={{ color: d.ds >= 0 ? C.green : C.red }}>Рост: <b>{d.ds >= 0 ? "+" : ""}{d.ds}</b></div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("subs");
  const [dir, setDir] = useState("desc");

  const stats = useMemo(() => ({
    total: DATA.length,
    growing: DATA.filter(d => d.ds > 0).length,
    shrinking: DATA.filter(d => d.ds < 0).length,
    avgER: (DATA.reduce((s,d) => s+d.eM, 0)/DATA.length).toFixed(1),
    totalSubs: Math.round(DATA.reduce((s,d) => s+d.sM, 0)/1000),
  }), []);

  const subData = useMemo(() => {
    return [...DATA]
      .filter(d => d.n !== "В России любят")
      .sort((a,b) => dir === "desc" ? b.dp - a.dp : a.dp - b.dp)
      .slice(0,15)
      .map(d => ({ name: short(d.n), n: d.n, value: d.dp, ds: d.ds }));
  }, [dir]);

  const erData = useMemo(() => {
    return [...DATA]
      .filter(d => d.n !== "Ищу тебя Салехард")
      .sort((a,b) => dir === "desc" ? b.de - a.de : a.de - b.de)
      .slice(0,15)
      .map(d => ({ name: short(d.n), n: d.n, eA: d.eA, eM: d.eM, de: d.de }));
  }, [dir]);

  const tabs = [
    { id:"subs", label:"📈 Подписчики" },
    { id:"er",   label:"⚡ ER" },
    { id:"dot",  label:"🔵 Карта" },
  ];

  return (
    <div style={{ padding:"24px 20px", maxWidth:960, margin:"0 auto" }}>

      {/* Header */}
      <div style={{ marginBottom:28 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:C.green, boxShadow:`0 0 8px ${C.green}` }} />
          <span style={{ fontSize:11, textTransform:"uppercase", letterSpacing:2, color:C.muted }}>Апрель → Май</span>
        </div>
        <h1 style={{ fontSize:26, fontWeight:800, letterSpacing:-0.5 }}>Статистика Telegram-каналов</h1>
        <p style={{ color:C.muted, fontSize:13, marginTop:4 }}>61 запущенный канал · ER и подписчики</p>
      </div>

      {/* Stats */}
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:28 }}>
        <StatCard label="Всего каналов" value={stats.total} color={C.green} />
        <StatCard label="Растут" value={stats.growing} color={C.green} />
        <StatCard label="Теряют" value={stats.shrinking} color={C.red} />
        <StatCard label="Ср. ER (май)" value={stats.avgER+"%"} color={C.yellow} />
        <StatCard label="Всего подп." value={stats.totalSubs+"K"} color={C.purple} />
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: tab===t.id ? C.green : C.card,
            color: tab===t.id ? "#0f172a" : C.muted,
            border:`1px solid ${tab===t.id ? C.green : C.border}`,
            borderRadius:8, padding:"7px 14px", fontSize:13,
            fontWeight: tab===t.id ? 700 : 400, cursor:"pointer"
          }}>{t.label}</button>
        ))}
        <button onClick={() => setDir(d => d==="desc"?"asc":"desc")} style={{
          marginLeft:"auto", background:C.card, color:C.muted,
          border:`1px solid ${C.border}`, borderRadius:8,
          padding:"7px 12px", fontSize:12, cursor:"pointer"
        }}>{dir==="desc" ? "▼ Лучшие" : "▲ Худшие"}</button>
      </div>

      {/* Chart */}
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px 16px" }}>

        {tab === "subs" && (<>
          <h2 style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>Рост подписчиков, % (топ-15)</h2>
          <p style={{ fontSize:12, color:C.muted, marginBottom:16 }}>«В России любят» (+87%) исключён для масштаба</p>
          <ResponsiveContainer width="100%" height={400}>
            <BarChart data={subData} layout="vertical" margin={{ left:10, right:30, top:0, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} horizontal={false} />
              <XAxis type="number" tick={{ fill:C.muted, fontSize:11 }} tickFormatter={v => v+"%"} />
              <YAxis type="category" dataKey="name" width={150} tick={{ fill:C.text, fontSize:11 }} />
              <Tooltip content={<CustomTooltipSub data={subData} />} />
              <ReferenceLine x={0} stroke={C.border} />
              <Bar dataKey="value" name="Рост %" radius={[0,4,4,0]}>
                {subData.map((d,i) => <Cell key={i} fill={d.value >= 0 ? C.green : C.red} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </>)}

        {tab === "er" && (<>
          <h2 style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>ER апрель vs май (топ-15)</h2>
          <p style={{ fontSize:12, color:C.muted, marginBottom:16 }}>«Ищу тебя Салехард» исключён (аномалия 0%→51%)</p>
          <ResponsiveContainer width="100%" height={400}>
            <BarChart data={erData} layout="vertical" margin={{ left:10, right:30, top:0, bottom:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} horizontal={false} />
              <XAxis type="number" tick={{ fill:C.muted, fontSize:11 }} tickFormatter={v => v+"%"} />
              <YAxis type="category" dataKey="name" width={160} tick={{ fill:C.text, fontSize:11 }} />
              <Tooltip content={<CustomTooltipER data={erData} />} />
              <Bar dataKey="eA" name="ER апрель" fill="#64748b" />
              <Bar dataKey="eM" name="ER май" radius={[0,4,4,0]}>
                {erData.map((d,i) => <Cell key={i} fill={d.de >= 0 ? C.green : C.red} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
          <div style={{ display:"flex", gap:16, marginTop:12, fontSize:12, color:C.muted }}>
            <span><span style={{ display:"inline-block", width:10, height:10, background:"#64748b", borderRadius:2, marginRight:4 }}/>ER апрель</span>
            <span><span style={{ display:"inline-block", width:10, height:10, background:C.green, borderRadius:2, marginRight:4 }}/>ER май (рост)</span>
            <span><span style={{ display:"inline-block", width:10, height:10, background:C.red, borderRadius:2, marginRight:4 }}/>ER май (падение)</span>
          </div>
        </>)}

        {tab === "dot" && (<>
          <h2 style={{ fontSize:15, fontWeight:700, marginBottom:4 }}>Подписчики vs ER (май)</h2>
          <p style={{ fontSize:12, color:C.muted, marginBottom:16 }}>Размер точки = масштаб изменения. 🟢 растёт · 🔴 падает</p>
          <ResponsiveContainer width="100%" height={400}>
            <ScatterChart margin={{ top:10, right:20, bottom:20, left:0 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="sM" name="Подписчики" tick={{ fill:C.muted, fontSize:11 }} tickFormatter={v => (v/1000).toFixed(0)+"K"} label={{ value:"Подписчики (тыс.)", position:"insideBottom", fill:C.muted, fontSize:11, offset:-10 }} />
              <YAxis dataKey="eM" name="ER %" tick={{ fill:C.muted, fontSize:11 }} tickFormatter={v => v+"%"} label={{ value:"ER %", angle:-90, position:"insideLeft", fill:C.muted, fontSize:11 }} />
              <Tooltip content={<ScatterTip />} />
              <Scatter data={DATA} shape={props => {
                const { cx, cy, payload } = props;
                const r = Math.max(5, Math.min(18, Math.abs(payload.ds) / 50));
                const color = payload.ds >= 0 ? C.green : C.red;
                return <circle cx={cx} cy={cy} r={r} fill={color} fillOpacity={0.7} stroke={color} strokeWidth={1} />;
              }} />
            </ScatterChart>
          </ResponsiveContainer>
        </>)}

      </div>

      <p style={{ textAlign:"center", color:C.border, fontSize:11, marginTop:20 }}>
        Данные: апрель–май · 61 запущенный канал
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
