<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Статистика Telegram-каналов</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; color: #e2e8f0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px; }
    .header { margin-bottom: 28px; }
    .header-badge { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6ee7b7; box-shadow: 0 0 8px #6ee7b7; }
    .badge-text { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .subtitle { color: #94a3b8; font-size: 13px; margin-top: 4px; }

    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px 18px; flex: 1; min-width: 110px; }
    .stat-val { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .tab-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; transition: all .15s; }
    .tab-btn.active { background: #6ee7b7; color: #0f172a; border-color: #6ee7b7; font-weight: 700; }
    .sort-btn { margin-left: auto; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; }

    .chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 20px 16px; }
    .chart-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .chart-note { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
    .chart-wrap { position: relative; }

    .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: #94a3b8; flex-wrap: wrap; }
    .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
    .footer { text-align: center; color: #334155; font-size: 11px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge">
      <div class="dot"></div>
      <span class="badge-text">Апрель → Май</span>
    </div>
    <h1>Статистика Telegram-каналов</h1>
    <p class="subtitle">61 запущенный канал · ER и подписчики</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="setTab('subs',this)">📈 Подписчики</button>
    <button class="tab-btn" onclick="setTab('er',this)">⚡ ER</button>
    <button class="tab-btn" onclick="setTab('scatter',this)">🔵 Карта</button>
    <button class="sort-btn" id="sortBtn" onclick="toggleSort()">▼ Лучшие</button>
  </div>

  <div class="chart-card">
    <div class="chart-title" id="chartTitle"></div>
    <div class="chart-note" id="chartNote"></div>
    <div class="chart-wrap">
      <canvas id="myChart"></canvas>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <p class="footer">Данные: апрель–май · 61 запущенный канал</p>
</div>

  {n:"в чувашии любят",sA:2489,sM:2421,eA:15,eM:23,ds:-68,dp:-2.7,de:8},
  {n:"В Краснодаре любят",sA:4029,sM:3886,eA:7,eM:4,ds:-143,dp:-3.5,de:-3},

  {n:"Ищу тебя Томск",sA:1400,sM:1404,eA:16,eM:22,ds:4,dp:0.3,de:6},
  {n:"Ищу тебя Иркутск",sA:7077,sM:7256,eA:30,eM:31,ds:179,dp:2.5,de:1},
  {n:"в сафоново любят",sA:1976,sM:1943,eA:28,eM:22,ds:-33,dp:-1.7,de:-6},
  {n:"в тюмени любят",sA:3452,sM:3377,eA:8,eM:10,ds:-75,dp:-2.2,de:2},
  {n:"Ищу тебя Салехард",sA:1311,sM:1361,eA:0,eM:51,ds:50,dp:3.8,de:51},
  {n:"В Нефтекамске любят",sA:2127,sM:2077,eA:23,eM:20,ds:-50,dp:-2.4,de:-3},
  {n:"В салехарде любят",sA:2620,sM:2604,eA:23,eM:24,ds:-16,dp:-0.6,de:1},
  {n:"Ищу тебя Междуреченск",sA:2741,sM:2943,eA:47,eM:48,ds:202,dp:7.4,de:1},
  {n:"в благовещенске любят",sA:1200,sM:1261,eA:20,eM:18,ds:61,dp:5.1,de:-2},
  {n:"В России любят",sA:5773,sM:10805,eA:14,eM:12,ds:5032,dp:87.2,de:-2},
  {n:"Ищу тебя Бугуруслан",sA:4529,sM:4697,eA:40,eM:34,ds:168,dp:3.7,de:-6},
  {n:"Ищу тебя Соль-Илецк",sA:4472,sM:4272,eA:25,eM:21,ds:-200,dp:-4.5,de:-4},
  {n:"В Нолинске любят",sA:1379,sM:1360,eA:34,eM:24,ds:-19,dp:-1.4,de:-10}
];

let currentTab = 'subs', sortDir = 'desc', chart = null;

// Render stat cards
const growing = DATA.filter(d => d.ds > 0).length;
const shrinking = DATA.filter(d => d.ds < 0).length;
const avgER = (DATA.reduce((s,d) => s+d.eM, 0)/DATA.length).toFixed(1);
const totalSubs = Math.round(DATA.reduce((s,d) => s+d.sM, 0)/1000);
document.getElementById('stats').innerHTML = [
  {label:'Всего каналов', val:DATA.length, color:'#6ee7b7'},
  {label:'Растут', val:growing, color:'#6ee7b7'},
  {label:'Теряют', val:shrinking, color:'#f87171'},
  {label:'Ср. ER (май)', val:avgER+'%', color:'#fbbf24'},
  {label:'Всего подп.', val:totalSubs+'K', color:'#a78bfa'},
].map(s => `<div class="stat-card"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');

const short = n => n.length > 22 ? n.slice(0,20)+'…' : n;
const tipStyle = { backgroundColor:'#1e293b', titleColor:'#6ee7b7', bodyColor:'#e2e8f0', borderColor:'#334155', borderWidth:1, padding:10 };

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sortBtn').style.display = tab === 'scatter' ? 'none' : '';
  renderChart();
}

function toggleSort() {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  document.getElementById('sortBtn').textContent = sortDir === 'desc' ? '▼ Лучшие' : '▲ Худшие';
  renderChart();
}

function renderChart() {
  if (chart) { chart.destroy(); chart = null; }
  const canvas = document.getElementById('myChart');
  const ctx = canvas.getContext('2d');

  if (currentTab === 'subs') {
    document.getElementById('chartTitle').textContent = 'Рост подписчиков, % (топ-15)';
    document.getElementById('chartNote').textContent = '«В России любят» (+87%) исключён для масштаба';
    document.getElementById('legend').innerHTML = '';
    canvas.height = 420;

    const rows = [...DATA].filter(d => d.n !== 'В России любят')
      .sort((a,b) => sortDir === 'desc' ? b.dp - a.dp : a.dp - b.dp).slice(0,15);

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: rows.map(d => short(d.n)),
        datasets: [{ data: rows.map(d => d.dp), backgroundColor: rows.map(d => d.dp >= 0 ? '#6ee7b7' : '#f87171'), borderRadius: 4, barPercentage: 0.7 }]
      },
      options: {
        indexAxis: 'y', responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { ...tipStyle, callbacks: {
            title: i => rows[i[0].dataIndex].n,
            label: i => { const d = rows[i.dataIndex]; return [`Изменение: ${d.dp >= 0?'+':''}${d.dp}%`, `Абсолютно: ${d.ds >= 0?'+':''}${d.ds}`]; }
          }}
        },
        scales: {
          x: { ticks: { color:'#94a3b8', font:{size:11}, callback: v => v+'%' }, grid: { color:'#334155' } },
          y: { ticks: { color:'#e2e8f0', font:{size:11}, crossAlign:'far' }, grid: { display:false } }
        }
      }
    });

  } else if (currentTab === 'er') {
    document.getElementById('chartTitle').textContent = 'ER апрель vs май (топ-15)';
    document.getElementById('chartNote').textContent = '«Ищу тебя Салехард» исключён (аномалия 0%→51%)';
    document.getElementById('legend').innerHTML = `
      <span><span class="legend-dot" style="background:#64748b"></span>ER апрель</span>
      <span><span class="legend-dot" style="background:#6ee7b7"></span>ER май (рост)</span>
      <span><span class="legend-dot" style="background:#f87171"></span>ER май (падение)</span>`;
    canvas.height = 420;

    const rows = [...DATA].filter(d => d.n !== 'Ищу тебя Салехард')
      .sort((a,b) => sortDir === 'desc' ? b.de - a.de : a.de - b.de).slice(0,15);

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: rows.map(d => short(d.n)),
        datasets: [
          { label:'ER апрель', data: rows.map(d => d.eA), backgroundColor: '#64748b', borderRadius: 2, barPercentage: 0.7 },
          { label:'ER май', data: rows.map(d => d.eM), backgroundColor: rows.map(d => d.de >= 0 ? '#6ee7b7' : '#f87171'), borderRadius: 4, barPercentage: 0.7 }
        ]
      },
      options: {
        indexAxis: 'y', responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { ...tipStyle, callbacks: {
            title: i => rows[i[0].dataIndex].n,
            label: i => { const d = rows[i.dataIndex]; return i.datasetIndex === 0 ? `ER апрель: ${d.eA}%` : [`ER май: ${d.eM}%`, `Δ: ${d.de >= 0?'+':''}${d.de}%`]; }
          }}
        },
        scales: {
          x: { ticks: { color:'#94a3b8', font:{size:11}, callback: v => v+'%' }, grid: { color:'#334155' } },
          y: { ticks: { color:'#e2e8f0', font:{size:11}, crossAlign:'far' }, grid: { display:false } }
        }
      }
    });

  } else {
    document.getElementById('chartTitle').textContent = 'Подписчики vs ER (май)';
    document.getElementById('chartNote').textContent = 'Размер точки = масштаб изменения. 🟢 растёт · 🔴 падает';
    document.getElementById('legend').innerHTML = '';
    canvas.height = 400;

    const pts = DATA.map(d => ({ x:d.sM, y:d.eM, r:Math.max(5,Math.min(20,Math.abs(d.ds)/40)), n:d.n, ds:d.ds }));

    chart = new Chart(ctx, {
      type: 'bubble',
      data: { datasets: [{
        data: pts,
        backgroundColor: pts.map(p => p.ds >= 0 ? 'rgba(110,231,183,0.65)' : 'rgba(248,113,113,0.65)'),
        borderColor: pts.map(p => p.ds >= 0 ? '#6ee7b7' : '#f87171'),
        borderWidth: 1
      }]},
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { ...tipStyle, callbacks: {
            label: i => { const d = i.raw; return [`${d.n}`, `Подп.: ${d.x.toLocaleString()}`, `ER: ${d.y}%`, `Рост: ${d.ds >= 0?'+':''}${d.ds}`]; }
          }}
        },
        scales: {
          x: { title:{display:true,text:'Подписчики',color:'#94a3b8',font:{size:11}}, ticks:{color:'#94a3b8',font:{size:11},callback:v=>(v/1000).toFixed(0)+'K'}, grid:{color:'#334155'} },
          y: { title:{display:true,text:'ER %',color:'#94a3b8',font:{size:11}}, ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'}, grid:{color:'#334155'} }
        }
      }
    });
  }
}

renderChart();
</script>
</body>
</html>
